<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Models Sorting Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; touch-action: none; user-select: none; }
        
        /* Makes the draggable images fill more horizontal space */
        .draggable-item { 
            transition: all 0.2s ease; 
            cursor: grab; 
            width: 100%; /* Fill container width */
            max-width: 600px; /* Prevent it from getting absurdly huge on ultrawide screens */
        }
        
        .draggable-item:active { cursor: grabbing; transform: scale(1.02); z-index: 50; }
        .drop-zone { transition: all 0.3s ease; min-height: 180px; }
        .drag-over { background-color: white !important; border-color: #3b82f6 !important; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        @keyframes success-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); background-color: #f0fdf4; } 100% { transform: scale(1); } }
        .correct-drop { animation: success-pulse 0.4s ease-out; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .incorrect-drop { animation: shake 0.3s ease-in-out; border-color: #ef4444 !important; }

        /* Smaller images once dropped into categories */
        .dropped-style {
            width: 90% !important;
            margin: 5px auto;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Financial Models Sorting</h1>
            
            <div class="flex flex-wrap items-center justify-center gap-4 mt-4">
                <span id="round-counter" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full font-bold text-sm shadow-sm">Round 1 of 4</span>
                <div class="flex gap-2">
                    <span class="bg-white border border-slate-200 text-slate-700 px-4 py-1 rounded-full font-bold text-sm shadow-sm">
                        Accuracy: <span id="accuracy-display" class="text-indigo-600">100</span>%
                    </span>
                    <span class="bg-white border border-slate-200 text-slate-700 px-4 py-1 rounded-full font-bold text-sm shadow-sm">
                        Attempts: <span id="attempts-display" class="text-indigo-600">0</span>
                    </span>
                </div>
            </div>
        </header>

        <div id="image-pool" class="bg-slate-200/50 border-2 border-dashed border-slate-300 rounded-2xl p-6 mb-10 min-h-[250px] flex flex-col items-center gap-6">
            </div>

        <div id="categories" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div id="round-modal" class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4 hidden">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-slate-800">Round Complete!</h3>
            <button id="next-btn" class="mt-6 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors">Start Next Round</button>
        </div>

        <div id="final-modal" class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4 hidden">
            <div class="text-5xl mb-4">🏆</div>
            <h3 class="text-2xl font-bold text-slate-800">Mastery Achieved!</h3>
            <p id="final-stats" class="text-slate-600 mt-2 font-semibold"></p>
            <button onclick="location.reload()" class="mt-6 w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-colors">Play Again</button>
        </div>
    </div>
